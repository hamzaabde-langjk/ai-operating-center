{% extends "base.html" %}

{% block title %}Projects - AI Operations Center{% endblock %}

{% block content %}
<nav class="sidebar">
    <div class="p-3">
        <h5 class="text-white mb-4"><i class="bi bi-cpu-fill text-primary"></i> AI Ops Center</h5>
    </div>
    <div class="nav flex-column">
        <a class="nav-link" href="/"><i class="bi bi-speedometer2"></i> Dashboard</a>
        <a class="nav-link active" href="/projects"><i class="bi bi-folder"></i> Projects</a>
        <a class="nav-link" href="/agents"><i class="bi bi-robot"></i> Agents</a>
        <a class="nav-link" href="/plugins"><i class="bi bi-puzzle"></i> Plugins</a>
        <a class="nav-link" href="/memory"><i class="bi bi-memory"></i> Memory</a>
        <a class="nav-link" href="/settings"><i class="bi bi-gear"></i> Settings</a>
    </div>
</nav>

<main class="main-content" style="margin-right: 0;">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4><i class="bi bi-folder"></i> Projects</h4>
        <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#newProjectModal">
            <i class="bi bi-plus-lg"></i> New Project
        </button>
    </div>

    <div class="row" id="projects-grid">
        <!-- Projects loaded dynamically -->
    </div>
</main>

<!-- New Project Modal -->
<div class="modal fade" id="newProjectModal" tabindex="-1">
    <div class="modal-dialog modal-dark">
        <div class="modal-content bg-dark border-secondary">
            <div class="modal-header border-secondary">
                <h5 class="modal-title">New Project</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div class="mb-3">
                    <label class="form-label">Project Name</label>
                    <input type="text" id="project-name" class="form-control bg-dark border-secondary text-white">
                </div>
                <div class="mb-3">
                    <label class="form-label">Description</label>
                    <textarea id="project-desc" class="form-control bg-dark border-secondary text-white" rows="3"></textarea>
                </div>
                <div class="mb-3">
                    <label class="form-label">Goal</label>
                    <textarea id="project-goal" class="form-control bg-dark border-secondary text-white" rows="3"></textarea>
                </div>
            </div>
            <div class="modal-footer border-secondary">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-primary" onclick="createProject()">Create</button>
            </div>
        </div>
    </div>
</div>

<script>
function loadProjects() {
    fetch('/api/v1/projects')
        .then(r => r.json())
        .then(projects => {
            const grid = document.getElementById('projects-grid');
            if (projects.length === 0) {
                grid.innerHTML = '<div class="text-muted text-center py-5">No projects yet</div>';
                return;
            }
            grid.innerHTML = projects.map(p => `
                <div class="col-md-6 col-lg-4 mb-3">
                    <div class="card h-100">
                        <div class="card-body">
                            <h6 class="mb-1">${p.name}</h6>
                            <p class="small text-muted">${p.description || 'No description'}</p>
                            <span class="badge bg-${p.status === 'active' ? 'success' : 'secondary'}">${p.status}</span>
                        </div>
                    </div>
                </div>
            `).join('');
        });
}

function createProject() {
    const name = document.getElementById('project-name').value;
    const desc = document.getElementById('project-desc').value;
    const goal = document.getElementById('project-goal').value;

    fetch('/api/v1/projects', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({name, description: desc, goal})
    })
    .then(() => {
        bootstrap.Modal.getInstance(document.getElementById('newProjectModal')).hide();
        loadProjects();
    });
}

loadProjects();
</script>
{% endblock %}
