{% extends "base.html" %}

{% block title %}Agents - AI Operations Center{% endblock %}

{% block content %}
<nav class="sidebar">
    <div class="p-3">
        <h5 class="text-white mb-4"><i class="bi bi-cpu-fill text-primary"></i> AI Ops Center</h5>
    </div>
    <div class="nav flex-column">
        <a class="nav-link" href="/"><i class="bi bi-speedometer2"></i> Dashboard</a>
        <a class="nav-link" href="/projects"><i class="bi bi-folder"></i> Projects</a>
        <a class="nav-link active" href="/agents"><i class="bi bi-robot"></i> Agents</a>
        <a class="nav-link" href="/plugins"><i class="bi bi-puzzle"></i> Plugins</a>
        <a class="nav-link" href="/memory"><i class="bi bi-memory"></i> Memory</a>
        <a class="nav-link" href="/settings"><i class="bi bi-gear"></i> Settings</a>
    </div>
</nav>

<main class="main-content" style="margin-right: 0;">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4><i class="bi bi-robot"></i> Agent Management</h4>
        <button class="btn btn-primary" onclick="createAgent()">
            <i class="bi bi-plus-lg"></i> New Agent
        </button>
    </div>

    <div class="row" id="agents-grid">
        <!-- Agents loaded dynamically -->
    </div>
</main>

<script>
function loadAgents() {
    fetch('/api/v1/agents/')
        .then(r => r.json())
        .then(agents => {
            const grid = document.getElementById('agents-grid');
            grid.innerHTML = agents.map(a => `
                <div class="col-md-6 col-lg-4 mb-3">
                    <div class="card h-100">
                        <div class="card-body">
                            <div class="d-flex justify-content-between align-items-start">
                                <div>
                                    <h6 class="mb-1">${a.name}</h6>
                                    <span class="badge bg-secondary">${a.role}</span>
                                    <span class="badge bg-info">${a.model}</span>
                                </div>
                                <span class="status-dot status-${a.status}"></span>
                            </div>
                            <div class="mt-3 small text-muted">
                                <div>Queue: ${a.queue_length} tasks</div>
                                <div>Completed: ${a.statistics?.tasks_completed || 0}</div>
                                <div>Failed: ${a.statistics?.tasks_failed || 0}</div>
                                <div>Tokens: ${a.statistics?.total_tokens_used || 0}</div>
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');
        });
}

function createAgent() {
    alert('Agent factory integration coming soon');
}

loadAgents();
setInterval(loadAgents, 5000);
</script>
{% endblock %}
